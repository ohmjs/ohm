name: ohmjs

services:

  ohm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      tags:
        - ${DOCKER_REPO:-ohmjs}/ohm:latest
        - ${DOCKER_REPO:-ohmjs}/ohm:${VERSION:-development}
      labels:
        - org.opencontainers.image.source=https://github.com/${OWNER:-ohmjs}/${REPO:-ohm}
        - org.opencontainers.image.licenses=MIT
        - org.opencontainers.image.description=Ohm tooling - A library and language for building parsers, interpreters, compilers, etc.
      x-bake:
        # even thought node:24-slim supports platforms linux/ppc64le & linux/s390x (see https://hub.docker.com/_/node/tags?name=24-slim),
        # pnpm install fails for there two
        platforms:
          - linux/amd64
          - linux/arm64/v8
      target: ${TARGET:-dist}
    volumes:
      - .:/local
    command: ["help"]
