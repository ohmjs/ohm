name: ohmjs

services:

  ohm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      tags:
        - ${DOCKER_REPO:-ohmjs}/ohm:latest
        - ${DOCKER_REPO:-ohmjs}/ohm:${VERSION:-development}
      labels:
        - org.opencontainers.image.source=https://github.com/${OWNER:-ohmjs}/${REPO:-ohm}
        - org.opencontainers.image.licenses=MIT
        - org.opencontainers.image.description=Ohm tooling - A library and language for building parsers, interpreters, compilers, etc.
      x-bake:
        # only platforms supported by the base image (node:24-slim) are included here
        # https://hub.docker.com/_/node/tags?name=24-slim
        platforms:
          - linux/amd64
          - linux/arm64/v8
          # # fails on pnpm install
          # - linux/ppc64le
          # - linux/s390x

      target: ${TARGET:-dist}
    volumes:
      - .:/local
    command: ["help"]
